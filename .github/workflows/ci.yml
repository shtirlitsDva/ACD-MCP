# Continuous integration for the AutoCAD-free parts of ACD-MCP.
#
# Acd.Mcp.dll itself can't build here — it references AutoCAD 2025 managed
# DLLs that don't exist on stock GitHub runners. So this workflow only
# validates the wire / runtime side (Acd.Mcp.Bridge, Acd.Mcp.Batch, tests).
# The full release is built locally via scripts/Build-Release.ps1.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore (AutoCAD-free projects)
        run: |
          dotnet restore src/Acd.Mcp.Batch/Acd.Mcp.Batch.csproj
          dotnet restore src/Acd.Mcp.Bridge/Acd.Mcp.Bridge.csproj
          dotnet restore src/Acd.Mcp.Batch.Tests/Acd.Mcp.Batch.Tests.csproj

      - name: Build Acd.Mcp.Batch
        run: dotnet build src/Acd.Mcp.Batch/Acd.Mcp.Batch.csproj -c Release --no-restore

      - name: Build Acd.Mcp.Bridge
        run: dotnet build src/Acd.Mcp.Bridge/Acd.Mcp.Bridge.csproj -c Release --no-restore

      - name: Test Acd.Mcp.Batch
        run: dotnet test src/Acd.Mcp.Batch.Tests/Acd.Mcp.Batch.Tests.csproj -c Release --no-restore --verbosity normal

      - name: Lint installer scripts (PSScriptAnalyzer)
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $issues = Invoke-ScriptAnalyzer -Path install-hooks,scripts -Recurse -Severity Warning,Error
          $issues | Format-Table -AutoSize
          if ($issues | Where-Object { $_.Severity -eq 'Error' }) { exit 1 }
