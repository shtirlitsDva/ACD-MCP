# CI for ACD-MCP. Builds the full solution on every push (including the
# AutoCAD plugin DLL — AutoCAD 2025 + Civil 3D 2025 refs come from NuGet,
# so no AutoCAD install is required on the runner). On tag push (v*),
# also produces the release zip and uploads it to a GitHub Release.
name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Acd.Mcp.sln

      - name: Build (full solution incl. AutoCAD plugin DLL)
        run: dotnet build Acd.Mcp.sln -c Release -p:Platform=x64 --no-restore

      - name: Test
        run: dotnet test Acd.Mcp.sln -c Release -p:Platform=x64 --no-restore --no-build --verbosity normal

      - name: Lint installer + release scripts (PSScriptAnalyzer)
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          # Invoke-ScriptAnalyzer's -Path is [String], not [String[]] — loop
          # rather than pass a comma-list (silent confusion otherwise).
          $issues = @()
          foreach ($p in 'plugins/acd-mcp/install-hooks','scripts') {
            $issues += Invoke-ScriptAnalyzer -Path $p -Recurse -Severity Warning,Error
          }
          $issues | Format-Table -AutoSize
          if ($issues | Where-Object { $_.Severity -eq 'Error' }) { exit 1 }

  release:
    # Only on tag push. Reuses the same Build-Release.ps1 a maintainer would
    # run locally, then `gh release create`s the resulting zip.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build release zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v',''
          pwsh ./scripts/Build-Release.ps1 -Version $version

      - name: Upload zip to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v',''
          $zip = "Deploy/acd-mcp-plugin-v$version.zip"
          if (-not (Test-Path $zip)) { throw "Release zip not found at $zip" }
          # If the tag-release already exists (e.g. created manually), upload
          # the asset to it; otherwise create the release and upload.
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip --clobber
          } else {
            gh release create $tag $zip --title "ACD-MCP $tag" --generate-notes
          }
